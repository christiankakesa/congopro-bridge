services:
  app:
    build: .
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - ./models:/app/models
    env_file:
      - ./.env
    environment:
      - OLLAMA_URL=http://ollama:11434
      - MEILISEARCH_URL=http://meilisearch:7700
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      meilisearch:
        condition: service_healthy

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    # ports:
    #   - "11434:11434"

  ollama-init:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    env_file:
      - ./.env
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Ollama service..."
        while ! ollama list > /dev/null; do sleep 2; done
        echo "Pulling ${GENERATIVE_MODEL}..."
        ollama pull ${GENERATIVE_MODEL}
        ollama pull ${EMBEDDING_MODEL}
        echo "Done."
    depends_on:
      ollama:
        condition: service_healthy

  meilisearch:
    image: getmeili/meilisearch:v1.37
    ports:
      - "7700:7700"
    environment:
      - MEILI_ENV=${MEILI_ENV:-development}
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-}
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ollama_data:
  meili_data: