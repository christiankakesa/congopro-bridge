# ─────────────────────────────────────────────────────────────────
# Congopro Bridge — Ads Configuration
# ─────────────────────────────────────────────────────────────────
# active       : bool   — master switch for the entire ad system
# rotation_sec : int    — how often the frontend rotates to the next ad (seconds)
# max_per_page : int    — max ads shown per search results page
#
# Each ad:
#   id          : unique string identifier
#   active      : bool   — individual on/off switch
#   title       : string — headline (max ~60 chars)
#   description : string — body copy (max ~120 chars)
#   url         : string — click-through destination
#   display_url : string — friendly URL shown in the ad
#   label       : string — badge text (default "Sponsored")
#   color       : hex    — left accent bar colour
#   period      :
#     start : YYYY-MM-DD — inclusive start date (omit = always)
#     end   : YYYY-MM-DD — inclusive end date   (omit = always)
#   weight      : int    — relative rotation weight (higher = shown more)
#   keywords    : list   — show ad only when query matches one of these
#                          (omit or empty = show on all queries)
# ─────────────────────────────────────────────────────────────────

x-labels-references:
  - sponsored:
      label: &sponsored_label "Sponsored"
      color: &sponsored_color "#1a73e8"   # Bleu professionnel (confiance, style Google)

  - promote:
      label: &promote_label "Promote"
      color: &promote_color "#137333"     # Vert assombri pour lisibilité (croissance)

  - featured:
      label: &featured_label "Featured"
      color: &featured_color "#ea8600"    # Doré/Ambre assombri (mise en avant premium)

  - recommended:
      label: &recommended_label "Recommended"
      color: &recommended_color "#9c27b0" # Violet (personnalisation, intelligence)

  - trending:
      label: &trending_label "Trending"
      color: &trending_color "#e65100"    # Orange dynamique à fort contraste (viral)

  - verified:
      label: &verified_label "Verified"
      color: &verified_color "#00838f"    # Cyan/Sarcelle profond (fiabilité)

  - top_choice:
      label: &top_choice_label "Top Choice"
      color: &top_choice_color "#d32f2f"  # Rouge conversion (décision)

  - popular:
      label: &popular_label "Popular"
      color: &popular_color "#8e24aa"     # Violet (engagement social)

  - premium:
      label: &premium_label "Premium"
      color: &premium_color "#5e35b1"     # Violet profond (luxe)

  - new:
      label: &new_label "New"
      color: &new_color "#2e7d32"         # Vert émeraude (découverte, fraîcheur)

  - business:
      label: &business_label "Business"
      color: &business_color "#3949ab"    # Indigo (corporate)

  - local:
      label: &local_label "Local"
      color: &local_color "#00695c"       # Sarcelle foncé (communauté)

  - partner:
      label: &partner_label "Partner"
      color: &partner_color "#5d4037"     # Marron stable (partenariat)

  - official:
      label: &official_label "Official"
      color: &official_color "#1565c0"    # Bleu institutionnel

  - hot:
      label: &hot_label "Hot"
      color: &hot_color "#d84315"         # Rouge-orange sombre (urgence/activité)

  - exclusive:
      label: &exclusive_label "Exclusive"
      color: &exclusive_color "#ad1457"   # Magenta (exclusivité)

  - top_rated:
      label: &top_rated_label "Top Rated"
      color: &top_rated_color "#1b5e20"   # Vert très sombre (qualité/réputation)

  - ad:
      label: &ad_label "Ad"
      color: &ad_color "#5f6368"          # Gris neutre moderne

# ─────────────────────────────────────────────────────────────────
# Congopro Bridge — Premium Ads Campaign
# ─────────────────────────────────────────────────────────────────

